<!doctype html><meta charset="utf-8"><title>New Flyer Batch</title><style>body{padding:28px;background:#080808;color:#eee;font:15px Arial}h1{color:#ffc400}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}.card{background:#111;border:1px solid #444}.card img{width:100%;aspect-ratio:3/4;object-fit:cover}.card div{padding:12px}.card a{color:#ffc400}</style><h1>New Uploaded Flyer Batch</h1><div class="grid" id="grid"></div><script src="master-archive-data.js"></script><script>const r=window.BTOS_MASTER_ARCHIVE.collections.flyers.filter(x=>x.source==="User-uploaded flyer batch");document.querySelector("#grid").innerHTML=r.map(f=>`<article class="card"><img src="${f.image}"><div><b>${f.title}</b><p>${f.dateText||"Date review"} · ${(f.djIds||[]).length} DJs · ${(f.mcIds||[]).length} MCs</p><a href="flyer-record.html?id=${f.id}">Open record →</a></div></article>`).join("")</script>
