<!doctype html><meta charset="utf-8"><title>Flyer & Photo Import Review</title><style>body{margin:0;padding:28px;background:#080808;color:#eee;font:15px Arial}h1{color:#ffc400}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.stat{padding:17px;background:#111;border:1px solid #444}.stat b{display:block;color:#ffc400;font-size:29px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-top:18px}.card{background:#111;border:1px solid #444}.card img{width:100%;aspect-ratio:3/4;object-fit:cover}.card div{padding:12px}.card p{color:#aaa}</style><h1>Flyer & Photo Import Review</h1><div class="stats" id="stats"></div><div class="grid" id="grid"></div><script src="master-archive-data.js"></script><script>const c=window.BTOS_MASTER_ARCHIVE.collections;document.querySelector("#stats").innerHTML=[["Flyers",c.flyers.length],["Flyers needing review",c.flyers.filter(x=>x.status==="review").length],["Photos",c.photos.length],["Promoters",c.promoters.length]].map(x=>`<div class="stat"><b>${x[1]}</b>${x[0]}</div>`).join("");document.querySelector("#grid").innerHTML=c.flyers.map(f=>`<article class="card"><img src="${f.image}"><div><b>${f.title}</b><p>${f.year||"Year review"} · ${f.promoterId||"Promoter review"}</p></div></article>`).join("");</script>
